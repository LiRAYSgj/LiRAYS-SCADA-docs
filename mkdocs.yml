site_name: LiRAYS-SCADA Docs
site_description: Documentation for installation, operations, integrations, and development
repo_url: https://github.com/LiRAYSgj/LiRAYS-SCADA-docs

docs_dir: doc
site_dir: site
strict: true

theme:
  name: readthedocs

nav:
  - Home: index.md
  - Users:
      - Overview: users/index.md
      - Installation:
          - Docker: users/installation/docker.md
          - Linux: users/installation/linux.md
          - macOS: users/installation/macos.md
      - Configuration:
          - Settings File: users/configuration/settings_file.md
      - Tutorials:
          - First Steps: users/tutorials/first_steps.md
  - Integrators:
      - Overview: integrators/index.md
      - SDK and Protocol: integrators/sdk.md
  - Developers:
      - Overview: developers/index.md
      - Development Environment: developers/environment/index.md
      - Contributing:
          - Overview: developers/contributing/index.md
          - Report Bug: developers/contributing/report_bug.md
          - Suggest Improvement: developers/contributing/suggest_improvement.md
          - Suggest New Feature: developers/contributing/suggest_new_feature.md
  - Roadmap:
      - Overview: roadmap/index.md
      - Product Vision: roadmap/vision.md
      - Timeline: roadmap/timeline.md

validation:
  nav:
    omitted_files: warn
  links:
    not_found: warn
